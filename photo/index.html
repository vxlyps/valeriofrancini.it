<body class="photo">

<a class="home-link" href="../">/ valerio francini</a>

<div class="photo-wrap">
    <div class="photo-head">/ photo &mdash; pellicola, 35mm, super8</div>
    <div class="gallery" id="gallery"></div>
</div>

<script src="../images/photo/photos.js"></script>
<script>
(function () {
    var list = window.VF_PHOTOS || [];
    var g = document.getElementById('gallery');

    if (!list.length) {
        /* segnaposto: celle quadrate uniformi finché non ci sono foto */
        for (var i = 0; i < 9; i++) {
            var ph = document.createElement('div');
            ph.className = 'frame-ph';
            ph.textContent = '/ presto';
            g.appendChild(ph);
        }
        return;
    }

    list.forEach(function (item) {
        var file = typeof item === 'string' ? item : item.file;
        var cap = typeof item === 'string' ? '' : (item.cap || '');
        var fig = document.createElement('figure');
        var img = document.createElement('img');
        img.src = '../images/photo/' + file;
        img.alt = cap || 'Valerio Francini';
        img.loading = 'lazy';
        img.decoding = 'async';
        fig.appendChild(img);
        if (cap) {
            var fc = document.createElement('figcaption');
            fc.textContent = '/ ' + cap;
            fig.appendChild(fc);
        }
        g.appendChild(fig);
    });
})();
</script>
</body>
</html>
